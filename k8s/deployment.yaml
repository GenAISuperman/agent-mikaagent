apiVersion: apps/v1
kind: Deployment
metadata:
  name: "mikaagent"
  namespace: "agents-dev"
  labels:
    app: "mikaagent"
    team: "dev"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "mikaagent"
  template:
    metadata:
      labels:
        app: "mikaagent"
        team: "dev"
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: "sa-mikaagent"
      containers:
        - name: "mikaagent"
          image: "acrshoppoc.azurecr.io/agents/mikaagent:latest"
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: "config-mikaagent"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
